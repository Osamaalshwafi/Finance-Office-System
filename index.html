<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

<script>
// ---------- متغيرات النظام ----------
let systemSettings = {
    sysName: "نظام المراسلات الإلكتروني لمكتب مالية تعز",
    sysIcon: "fa-balance-scale",
    settingsPasswordHash: "123456"
};
let loggedUser = null;
let activeTab = 'overview';
let currentDocFilter = 'all';
let branches = [];
let users = [];
let documents = [];
let dynamicForms = [];
let fileFillers = [];
let supabase = null;
let DB_CONNECTED = false;
let triedDatabase = false;
let fallbackUsed = false;
// بيانات تجريبية
const defaultBranches = [{ id: "main_hq", name: "المركز الرئيسي بمكتب المالية تعز", district: "وسط المدينة" }, { id: "alqahera_br", name: "فرع مديرية القاهرة", district: "القاهرة" }, { id: "mudhaffar_br", name: "فرع مديرية المظفر", district: "المظفر" }, { id: "salah_br", name: "فرع مديرية صالة", district: "صالة" }];
const defaultUsers = [ { id: "u_admin", name: "أ. ماجد السامعي", title: "مدير عام مكتب المالية تعز", branchId: "main_hq", role: "مدير نظام", username: "admin", passwordHash: sha256("123456"), avatar: "", phone: "", whatsapp: "" },
  { id: "u_user1", name: "م. منيف القدسي", title: "مسؤول الشؤون المالية بمديرية القاهرة", branchId: "alqahera_br", role: "موظف فرع", username: "alqahera", passwordHash: sha256("123456"), avatar: "", phone: "", whatsapp: "" } ];
const defaultDocs = [{ id: "doc1", tab: "قرارات", senderId: "u_admin", receiverBranchId: "alqahera_br", title: "قرار إداري رقم 15", desc: "...", timestamp: "2026-05-18T14:00:00.000Z" }];
const defaultDynamicForms = [];
const defaultFileFillers = [];
// ----- أدوات مساعدة -----
function sha256(str) {
  // استخدم مكتبة CryptoJS المتوفرة
  return CryptoJS.SHA256(str).toString(CryptoJS.enc.Hex);
}
function nowstr() {
    return new Date().toISOString();
}
function showToast(msg, type="info") {
    // يكتفي بالتنبيه البرمجي هنا (يمكنك تعديل الواجهة لإبراز رسائل الخطأ)
    alert(msg);
}
// ---------- الاتصال بقاعدة البيانات (Supabase) ----------
function connectToSupabase(url, key) {
    try {
        supabase = window.supabase.createClient(url, key);
        DB_CONNECTED = true;
    } catch (e) {
        DB_CONNECTED = false;
        supabase = null;
    }
}
function tryInitDatabase() {
    const supabaseUrl = 'https://rpvlqiautlhnezjsodwd.supabase.co';
    const supabaseKey = 'sb_publishable_DuOcI1uigYQLBYWrv3Pn7g_8IZ2Udn6';
    try {
        connectToSupabase(supabaseUrl, supabaseKey);
    } catch(e) {
        DB_CONNECTED = false;
    }
}
// ---------- تحميل كل البيانات (مع معالجة فشل القاعدة = استخدام بيانات تجريبية) ----------
async function loadAllData() {
    triedDatabase = true;
    if (!supabase || !DB_CONNECTED) { // فشل الاتصال أو المفتاح خطأ
        useFallbackData('فشل الاتصال بقاعدة البيانات. سيتم التحميل بوضع تجريبي.');
        return;
    }
    try {
        let { data: branchesData, error: bErr } = await supabase.from('branches').select('*');
        if (bErr) throw new Error('branches: ' + bErr.message);
        let { data: usersData, error: uErr } = await supabase.from('users').select('*');
        if (uErr) throw new Error('users: ' + uErr.message);
        let { data: docsData, error: dErr } = await supabase.from('documents').select('*');
        if (dErr) throw new Error('documents: ' + dErr.message);
        let { data: formsData, error: fErr } = await supabase.from('dynamic_forms').select('*');
        if (fErr) throw new Error('forms: ' + fErr.message);
        let { data: fillersData, error: filefErr } = await supabase.from('file_fillers').select('*');
        if (filefErr) throw new Error('file_fillers: ' + filefErr.message);
        branches = branchesData && branchesData.length ? branchesData : defaultBranches;
        users = usersData && usersData.length ? usersData : defaultUsers;
        documents = docsData && docsData.length ? docsData : defaultDocs;
        dynamicForms = formsData && formsData.length ? formsData : defaultDynamicForms;
        fileFillers = fillersData && fillersData.length ? fillersData : defaultFileFillers;
        showToast('تم تحميل البيانات من القاعدة بنجاح', 'success');
        fallbackUsed = false;
    } catch (e) {
        console.error('DB error:', e, nowstr());
        useFallbackData('حصلت مشكلة في تحميل البيانات من قاعدة البيانات! تم التحويل للوضع التجريبي. سبب الخطأ: ' + e.message);
        DB_CONNECTED = false;
    }
}
function useFallbackData(msg) {
    branches = defaultBranches;
    users = defaultUsers;
    documents = defaultDocs;
    dynamicForms = defaultDynamicForms;
    fileFillers = defaultFileFillers;
    fallbackUsed = true;
    showToast(msg, 'error');
}
// --------- معالجة تسجيل الدخول ---------
async function handleLogin(event) {
    event.preventDefault();
    const uInput = document.getElementById('login-username').value.trim();
    const pInput = document.getElementById('login-password').value;
    const inputHash = sha256(pInput);
    let matchedUser = null;
    let error = null;
    // إذا القاعدة ليست متصلة سيكون البحث محلي فقط
    if (!DB_CONNECTED || fallbackUsed) {
        matchedUser = users.find(u => (u.username && u.username.toLowerCase() === uInput.toLowerCase()) && (u.passwordHash === inputHash));
        if (!matchedUser) error = 'بيانات الدخول خاطئة (تم التدقيق محلياً فقط، قد تختلف عن البيانات الرسمية)';
    } else {
        try {
            const { data, error: dberr } = await supabase.from('users').select('*').eq('username', uInput.toLowerCase()).eq('passwordHash', inputHash).single();
            if (dberr) { error = dberr.message; }
            if (data) matchedUser = data;
            else error = 'بيانات الدخول غير صحيحة مع القاعدة.';
        } catch (e) {
            error = 'تعذر التحقق من قاعدة البيانات: ' + e.message;
        }
    }
    if (matchedUser) {
        loggedUser = matchedUser;
        showToast("مرحباً بك! تم تسجيل الدخول.", "success");
        enterDashboard();
    } else {
        showToast(error || 'فشل التحقق من المستخدم!');
    }
}
// --------- عند بدء التحميل ---------
window.onload = async function() {
    tryInitDatabase();
    await loadAllData();
    // ... يمكنك هنا تفعيل الزر وإظهار دليل الأخطاء ...
    if (fallbackUsed) showOfflineWarning();
};
// --------- دليل/تحذير عند العمل بدون قاعدة بيانات ---------
function showOfflineWarning() {
    setTimeout(() => {
        alert('⚠️ انتبه: النظام حالياً في الوضع التجريبي، ولا يتم حفظ أي بيانات جديدة في قاعدة البيانات! قد تكون المعلومات غير محدثة.');
    }, 800);
}
function enterDashboard() {
    // أكمل بقية وظائف الدخول للوحة التحكم كما المعتاد
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('dashboard-screen').classList.remove('hidden');
    // املأ بيانات المستخدم
    if (loggedUser) {
        const name = document.getElementById('user-full-name');
        const title = document.getElementById('user-title');
        const hero = document.getElementById('hero-welcome-msg');
        if (name) name.textContent = loggedUser.name;
        if (title) title.textContent = loggedUser.title;
        if (hero) hero.textContent = 'أهلاً بك، ' + loggedUser.name;
        if (loggedUser.avatar) {
            document.getElementById('user-avatar').src = loggedUser.avatar;
        }
    }
    // ... باقي الأكواد ...
}
</script>

<!-- عند فشل قاعدة البيانات سيتم تفعيل معالجة Local فقط ، وسيظهر تنبيه بالوضع التجريبي -->

</body>
</html>
